  { text: "Humans evolved from chimpanzees (we share a common ancestor; modern chimps are our evolutionary cousins, not our ancestors)", cat: "Science" },
  { text: "We are in the middle of a mass extinction (this is accurate, not a myth — but is widely denied in industry-funded communications)", cat: "Science" },
  { text: "Detox diets remove toxins (your liver and kidneys do this continuously; no supplement accelerates the process)", cat: "Science" },
  { text: "Alkaline water balances your body's pH (the body tightly regulates blood pH regardless of what you drink; stomach acid neutralizes alkaline water instantly)", cat: "Science" },

  // MARKETING INDUSTRY ITSELF
  { text: "Black Friday deals are genuinely the year's lowest prices (studies consistently find that 93% of Black Friday prices are matched or beaten during the rest of the year)", cat: "Marketing Industry" },
  { text: "Sales that end in .99 are a coincidence (the practice dates to the 1880s and was designed to force cashiers to open the register, reducing theft; now exploited as a psychological pricing tool)", cat: "Marketing Industry" },
  { text: "Limited-time offers are actually time-limited", cat: "Marketing Industry" },
  { text: "Celebrity endorsements reflect genuine product use or belief", cat: "Marketing Industry" },
  { text: "'As seen on TV' implies scientific validation", cat: "Marketing Industry" },
  { text: "Customer reviews on retail platforms are reliable (the FTC estimates 30–40% of online reviews are fake or incentivized)", cat: "Marketing Industry" },
  { text: "Influencer 'honest reviews' are unsolicited opinions (most are paid partnerships; disclosure requirements are widely violated)", cat: "Marketing Industry" },
  { text: "A product's list price is its actual value (the 'original price' shown during a sale is often a fictional reference point set to make discounts seem large)", cat: "Marketing Industry" },
  { text: "Free trials are free (they are designed around conversion psychology; cancellation is deliberately made difficult)", cat: "Marketing Industry" },
  { text: "Subscription services can be cancelled anytime (legally true, practically designed to be as frictionless to join and as friction-heavy to leave as possible)", cat: "Marketing Industry" },
  { text: "Awards and certifications on packaging are independently verified (many are self-awarded, purchased, or based on narrow criteria)", cat: "Marketing Industry" },
  { text: "'Clinically proven' on packaging means FDA approval (it means only that the company ran a study; it reveals nothing about study quality, size, or independence)", cat: "Marketing Industry" },
  { text: "Loyalty points and miles are worth their advertised value (redemption value is typically far lower than the stated earn rate implies; airlines and banks deliberately inflate the apparent value)", cat: "Marketing Industry" },
  { text: "Surge pricing is a neutral market mechanism (it is algorithmically engineered to extract maximum willingness to pay, not to balance supply and demand)", cat: "Marketing Industry" },

  // EDUCATION & WORK
  { text: "A college degree guarantees career success", cat: "Work & Education" },
  { text: "Private universities provide meaningfully better education than public ones for most students", cat: "Work & Education" },
  { text: "Your passion should drive your career choice (passion often follows mastery, not precede it; 'follow your passion' advice is linked to worse career outcomes in research)", cat: "Work & Education" },
  { text: "Hustle culture leads to greater productivity (research consistently links overwork to lower output, higher error rates, and burnout)", cat: "Work & Education" },
  { text: "The best employees are always the most visible ones (proximity bias in offices means visible workers are rated more highly regardless of output)", cat: "Work & Education" },
  { text: "MBA degrees pay for themselves quickly (median salary premiums rarely offset tuition at top programs within 5 years for most graduates)", cat: "Work & Education" },
  { text: "Unpaid internships are a normal and necessary step (they are often illegal under labor law in many countries and disproportionately filter out non-wealthy candidates)", cat: "Work & Education" },
  { text: "Working from home makes you less productive (multiple large studies show remote workers are equal or more productive than office counterparts)", cat: "Work & Education" },

  // SOCIETY & MEDIA
  { text: "The news cycle reflects the most important events of the day (it reflects what generates clicks, shares, and emotional engagement)", cat: "Society & Media" },
  { text: "Social media is free to use (you pay with attention, data, and psychological manipulation)", cat: "Society & Media" },
  { text: "Viral content is organically discovered (most virality is amplified by algorithmic amplification and paid seeding)", cat: "Society & Media" },
  { text: "PR statements from companies reflect genuine corporate values", cat: "Society & Media" },
  { text: "Charity partnerships with brands primarily benefit the charity (cause marketing typically benefits brand perception more than the cause)", cat: "Society & Media" },
  { text: "Prices in supermarkets are set by supply and demand (they are set by retailer algorithms, promotional calendars, and shrinkflation strategies)", cat: "Society & Media" },
  { text: "Airport and movie theater prices are high due to high rents (captive audience pricing; studies show identical items cost up to 400% more in captive environments)", cat: "Society & Media" },
  { text: "Hotel 'rack rates' are real prices (they are inflated reference prices; almost no one pays them)", cat: "Society & Media" },
  { text: "Children's toys labeled 'educational' meet any specific standard (no regulatory body defines what 'educational' means on packaging)", cat: "Society & Media" },
  { text: "Premium economy flights are a significantly better experience than economy (the seat pitch difference is often minimal; the pricing difference is rarely proportional)", cat: "Society & Media" },
  { text: "News is separated from advertising in digital media (native advertising, sponsored content, and algorithmic curation blur the line completely)", cat: "Society & Media" },

  // INDIA SPECIFIC
  { text: "Fair skin is an indicator of health or attractiveness (a colonial-era myth maintained by a billion-dollar skin-lightening industry)", cat: "India Specific" },
  { text: "'Ayurvedic' on packaging implies ancient purity (many products use the label while containing synthetic ingredients; regulation is minimal)", cat: "India Specific" },
  { text: "Gold is a reliable inflation hedge and investment (gold has underperformed equities over most 20+ year periods in India)", cat: "India Specific" },
  { text: "Real estate in Indian cities always appreciates (many tier-2 city properties have seen negative real returns after accounting for inflation and maintenance)", cat: "India Specific" },
  { text: "LIC is the safest and best insurance-cum-investment product (most LIC endowment plans return 4–5% annually; term insurance + index funds is almost always superior)", cat: "India Specific" },

  // MISCELLANEOUS

  { text: "Feng shui products meaningfully improve wellbeing", cat: "Miscellaneous" },
  { text: "Magnetic therapy products relieve pain (no clinical evidence supports this)", cat: "Miscellaneous" },

  { text: "Noise-cancelling headphones cancel all noise (they cancel low-frequency continuous noise well; high-frequency and sudden sounds pass through)", cat: "Miscellaneous" },
  { text: "Luxury goods are priced by production cost (luxury pricing is almost entirely psychological; a Hermès Birkin costs ~$800 to produce and sells for $10,000+)", cat: "Miscellaneous" },
  { text: "Hotel thread count correlates with sheet comfort (thread count is often manipulated by counting individual threads in multi-ply yarn; 400 TC can feel worse than 200 TC)", cat: "Miscellaneous" },
  { text: "Diamonds are rare (they are abundant; De Beers maintains scarcity through supply control)", cat: "Miscellaneous" },
  { text: "Airport tax-free shops offer genuine duty-free savings (prices are often higher than high-street shops even before tax is added)", cat: "Miscellaneous" },
  { text: "The 'new car smell' is a pleasant natural feature (it is the off-gassing of volatile organic compounds from plastics, adhesives, and upholstery)", cat: "Miscellaneous" },
  { text: "'Made in Italy' on clothing guarantees Italian manufacture (the label is legal if only the finishing stitch is done in Italy)", cat: "Miscellaneous" },
  { text: "Press releases are journalism", cat: "Miscellaneous" },
];

const cats = ['All', ...new Set(lies.map(l => l.cat))];
let active = 'All';
let isDark = false;

const filtersEl = document.getElementById('filters');
const listEl = document.getElementById('list');
const countEl = document.getElementById('count');

function toggleTheme() {
  isDark = !isDark;
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  document.getElementById('toggleLabel').textContent = isDark ? 'Light mode' : 'Dark mode';
  document.getElementById('toggleIcon').textContent = isDark ? '○' : '◑';
}

function render() {
  const filtered = active === 'All' ? lies : lies.filter(l => l.cat === active);
  countEl.innerHTML = 'Showing <span>' + filtered.length + '</span> of ' + lies.length + ' entries';
  listEl.innerHTML = filtered.map((l, i) =>
    '<li class="ml-entry">' +
      '<span class="ml-index">' + String(i + 1).padStart(3, '0') + '</span>' +
      '<div class="ml-content">' +
        '<p class="ml-lie">' + l.text + '</p>' +
        '<p class="ml-cat">' + l.cat + '</p>' +
      '</div>' +
      '<span class="ml-stamp">Debunked</span>' +
    '</li>'
  ).join('');
}

filtersEl.innerHTML = cats.map(c =>
  '<button class="ml-filter' + (c === 'All' ? ' active' : '') + '" onclick="setFilter(\'' + c.replace(/['"]/g, '') + '\')">' + c + '</button>'
).join('');

function setFilter(cat) {
  active = cat;
  document.querySelectorAll('.ml-filter').forEach(function(b) {
    b.classList.toggle('active', b.textContent === cat);
  });
  render();
}

render();
</script>
</body>
</html>
